kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "npm run dev -w @workspace/server"

[services.production]

[services.production.build]
args = ["npm", "run", "build", "-w", "@workspace/server"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "server/dist/index.mjs"]

[services.production.run.env]
SERVER_PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
