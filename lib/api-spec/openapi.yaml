openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dev Sakarsawala Portfolio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: projects
    description: Portfolio projects
  - name: skills
    description: Developer skills
  - name: experience
    description: Work experience
  - name: about
    description: About section content
  - name: contact
    description: Contact messages
  - name: education
    description: Education history
  - name: stats
    description: Portfolio statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      responses:
        "200":
          description: Skills grouped by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: createSkill
      tags: [skills]
      summary: Create a skill (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /skills/{id}:
    put:
      operationId: updateSkill
      tags: [skills]
      summary: Update a skill (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "200":
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
    delete:
      operationId: deleteSkill
      tags: [skills]
      summary: Delete a skill (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /experience:
    get:
      operationId: listExperience
      tags: [experience]
      summary: List all experience entries
      responses:
        "200":
          description: Experience list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Experience"
    post:
      operationId: createExperience
      tags: [experience]
      summary: Create an experience entry (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperienceInput"
      responses:
        "201":
          description: Experience created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experience"

  /experience/{id}:
    put:
      operationId: updateExperience
      tags: [experience]
      summary: Update an experience entry (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperienceInput"
      responses:
        "200":
          description: Experience updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experience"
    delete:
      operationId: deleteExperience
      tags: [experience]
      summary: Delete an experience entry (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /about:
    get:
      operationId: getAbout
      tags: [about]
      summary: Get about section content
      responses:
        "200":
          description: About content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/About"
    put:
      operationId: updateAbout
      tags: [about]
      summary: Update about section (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AboutInput"
      responses:
        "200":
          description: About updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/About"

  /contact:
    get:
      operationId: listContactMessages
      tags: [contact]
      summary: List contact messages (admin)
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"
    post:
      operationId: sendContactMessage
      tags: [contact]
      summary: Send a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /contact/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [contact]
      summary: Mark message as read (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /education:
    get:
      operationId: listEducation
      tags: [education]
      summary: List all education entries
      responses:
        "200":
          description: Education list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Education"
    post:
      operationId: createEducation
      tags: [education]
      summary: Create an education entry (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EducationInput"
      responses:
        "201":
          description: Education created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Education"

  /education/{id}:
    put:
      operationId: updateEducation
      tags: [education]
      summary: Update an education entry (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EducationInput"
      responses:
        "200":
          description: Education updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Education"
    delete:
      operationId: deleteEducation
      tags: [education]
      summary: Delete an education entry (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getPortfolioStats
      tags: [stats]
      summary: Get portfolio statistics (wow endpoint)
      responses:
        "200":
          description: Portfolio statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthToken:
      type: object
      required: [token, admin]
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/Admin"

    Admin:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]

    Project:
      type: object
      required: [id, title, description, techStack, featured, category, order]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        longDescription:
          type: ["string", "null"]
        techStack:
          type: array
          items:
            type: string
        imageUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        liveUrl:
          type: ["string", "null"]
        featured:
          type: boolean
        category:
          type: string
        order:
          type: integer
        createdAt:
          type: string

    ProjectInput:
      type: object
      required: [title, description, techStack, category]
      properties:
        title:
          type: string
        description:
          type: string
        longDescription:
          type: ["string", "null"]
        techStack:
          type: array
          items:
            type: string
        imageUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        liveUrl:
          type: ["string", "null"]
        featured:
          type: boolean
        category:
          type: string
        order:
          type: integer

    Skill:
      type: object
      required: [id, name, category, proficiency]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        proficiency:
          type: integer
        icon:
          type: ["string", "null"]
        order:
          type: integer

    SkillInput:
      type: object
      required: [name, category, proficiency]
      properties:
        name:
          type: string
        category:
          type: string
        proficiency:
          type: integer
        icon:
          type: ["string", "null"]
        order:
          type: integer

    Experience:
      type: object
      required: [id, company, role, startDate, current]
      properties:
        id:
          type: string
        company:
          type: string
        role:
          type: string
        location:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        description:
          type: string
        achievements:
          type: array
          items:
            type: string
        order:
          type: integer

    ExperienceInput:
      type: object
      required: [company, role, startDate, current, description]
      properties:
        company:
          type: string
        role:
          type: string
        location:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        description:
          type: string
        achievements:
          type: array
          items:
            type: string
        order:
          type: integer

    About:
      type: object
      required: [id, bio, tagline]
      properties:
        id:
          type: string
        bio:
          type: string
        tagline:
          type: string
        yearsOfExperience:
          type: integer
        projectsCompleted:
          type: integer
        technologiesUsed:
          type: integer
        profileImageUrl:
          type: ["string", "null"]
        resumeUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        email:
          type: string
        location:
          type: ["string", "null"]
        codingPhilosophy:
          type: ["string", "null"]

    AboutInput:
      type: object
      required: [bio, tagline, email]
      properties:
        bio:
          type: string
        tagline:
          type: string
        yearsOfExperience:
          type: integer
        projectsCompleted:
          type: integer
        technologiesUsed:
          type: integer
        profileImageUrl:
          type: ["string", "null"]
        resumeUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        email:
          type: string
        location:
          type: ["string", "null"]
        codingPhilosophy:
          type: ["string", "null"]

    ContactMessage:
      type: object
      required: [id, name, email, message, read, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        subject:
          type: ["string", "null"]
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: ["string", "null"]
        message:
          type: string

    Education:
      type: object
      required: [id, institution, degree, field, startDate, current, order]
      properties:
        id:
          type: string
        institution:
          type: string
        degree:
          type: string
        field:
          type: string
        location:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        grade:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        achievements:
          type: array
          items:
            type: string
        order:
          type: integer

    EducationInput:
      type: object
      required: [institution, degree, field, startDate, current]
      properties:
        institution:
          type: string
        degree:
          type: string
        field:
          type: string
        location:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        current:
          type: boolean
        grade:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        achievements:
          type: array
          items:
            type: string
        order:
          type: integer

    PortfolioStats:
      type: object
      required: [totalProjects, featuredProjects, totalSkills, skillsByCategory, totalMessages, unreadMessages, yearsOfExperience]
      properties:
        totalProjects:
          type: integer
        featuredProjects:
          type: integer
        totalSkills:
          type: integer
        skillsByCategory:
          type: object
          additionalProperties:
            type: integer
        totalMessages:
          type: integer
        unreadMessages:
          type: integer
        yearsOfExperience:
          type: integer
